<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ LEONARDX - Solicita tu Canción</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
color:white;

background:url("space.gif") center center fixed;
background-size:cover;

min-height:100vh;
padding:30px;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-1;
}

.logo{
display:block;
width:280px;
max-width:90%;
margin:20px auto;

filter:
drop-shadow(0 0 10px #00ffff)
drop-shadow(0 0 20px #00ffff)
drop-shadow(0 0 40px #00ffff);

animation:flotar 3s ease-in-out infinite;
}

@keyframes flotar{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

h1{
text-align:center;
font-size:3rem;
color:#ffd700;
margin-bottom:25px;

text-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffd700;
}

.card{
max-width:900px;
margin:auto;

background:rgba(0,0,0,.75);
backdrop-filter:blur(10px);

border:2px solid rgba(255,215,0,.4);

padding:30px;
border-radius:25px;

box-shadow:
0 0 20px rgba(255,215,0,.4),
0 0 50px rgba(255,215,0,.2);
}

input{
width:100%;
padding:16px;
margin-bottom:15px;

border:none;
border-radius:12px;

font-size:16px;
outline:none;
}

button{
width:100%;
padding:16px;

border:none;
border-radius:12px;

background:#ffd700;
color:black;

font-size:18px;
font-weight:bold;

cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
box-shadow:0 0 20px #ffd700;
}

.contador{
text-align:center;
margin-top:15px;
font-size:18px;
color:#00ffff;
font-weight:bold;
}

#listaCanciones{
max-width:900px;
margin:30px auto;
}

.song{
background:rgba(0,0,0,.75);

border-radius:15px;
padding:20px;
margin-bottom:15px;

backdrop-filter:blur(5px);

border:1px solid rgba(255,255,255,.1);

box-shadow:
0 0 15px rgba(255,255,255,.08);
}

.song h3{
margin-bottom:10px;
color:#00ffff;
}

.song p{
margin-bottom:10px;
}

.voteBtn{
margin-top:10px;
}

.top{
color:#ffd700;
font-size:20px;
font-weight:bold;
}

@media(max-width:768px){

.logo{
width:220px;
}

h1{
font-size:2rem;
}

.card{
padding:20px;
}

}

</style>
</head>

<body>

<img src="logo.webp" class="logo" alt="DJ LEONARDX">

<h1>🎵 Solicita tu Canción 🎵</h1>

<div class="card">

<input
id="nombre"
placeholder="Tu nombre">

<input
id="cancion"
placeholder="Nombre de la canción">

<button onclick="enviarCancion()">
Enviar Solicitud
</button>

<div class="contador" id="contador">
Solicitudes: 0
</div>

</div>

<div id="listaCanciones"></div>

<script type="module">

import {
db,
auth,
ref,
push,
set,
get,
onValue,
runTransaction
}
from "./firebase.js";

window.enviarCancion = async function(){

const nombre =
document.getElementById("nombre").value.trim();

const cancion =
document.getElementById("cancion").value.trim();

if(!nombre || !cancion){
alert("Completa todos los campos");
return;
}

const snapshot =
await get(ref(db,"solicitudes"));

let encontrada = null;

if(snapshot.exists()){

snapshot.forEach(item=>{

const data = item.val();

if(
data.cancion.toLowerCase()
===
cancion.toLowerCase()
){
encontrada = item.key;
}

});

}

if(encontrada){

votar(encontrada);

alert("Esta canción ya existe. Se sumó tu voto.");

}else{

const nuevaRef =
push(ref(db,"solicitudes"));

await set(nuevaRef,{
nombre,
cancion,
fecha:Date.now(),
votos:1,
estado:"pendiente"
});

}

document.getElementById("cancion").value="";
}

window.votar = async function(idCancion){

const uid = auth.currentUser.uid;

const votoRef =
ref(db,`votosUsuarios/${idCancion}/${uid}`);

const yaVoto =
await get(votoRef);

if(yaVoto.exists()){
alert("Ya votaste por esta canción");
return;
}

await set(votoRef,true);

const votosRef =
ref(db,`solicitudes/${idCancion}/votos`);

await runTransaction(
votosRef,
(actual)=> (actual || 0)+1
);

}

onValue(
ref(db,"solicitudes"),
(snapshot)=>{

const lista =
document.getElementById("listaCanciones");

lista.innerHTML="";

if(!snapshot.exists()){
document.getElementById("contador").innerText =
"Solicitudes: 0";
return;
}

const canciones=[];

snapshot.forEach(item=>{

canciones.push({
id:item.key,
...item.val()
});

});

document.getElementById("contador").innerText =
"Solicitudes: " + canciones.length;

canciones.sort(
(a,b)=>b.votos-a.votos
);

canciones.forEach((song,index)=>{

lista.innerHTML += `
<div class="song">

${index===0 ?
'<div class="top">👑 MÁS VOTADA</div>'
: ''}

<h3>${song.cancion}</h3>

<p>👍 ${song.votos} votos</p>

<button
class="voteBtn"
onclick="votar('${song.id}')">
Votar
</button>

</div>
`;

});

});

</script>

</body>
</html>
