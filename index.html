<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ LEONARDX - Solicita tu Canción</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    color:white;

    background:url("space.gif") center center fixed;
    background-size:cover;

    min-height:100vh;
    padding:30px;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.60);
    z-index:-1;
}

.logo{
    display:block;
    width:320px;
    max-width:90%;
    margin:20px auto;
}

h1{
    text-align:center;
    color:#ffd700;
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 0 20px #ffd700;
}

.card{
    max-width:900px;
    margin:auto;
    background:rgba(20,20,20,0.85);
    backdrop-filter:blur(8px);

    padding:25px;
    border-radius:20px;

    box-shadow:
    0 0 20px rgba(255,215,0,.3);
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;

    border:none;
    border-radius:10px;

    font-size:16px;
}

button{
    width:100%;
    padding:15px;

    border:none;
    border-radius:10px;

    background:#ffd700;
    color:black;

    font-weight:bold;
    font-size:16px;

    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.02);
}

#listaCanciones{
    max-width:900px;
    margin:30px auto;
}

.song{
    background:rgba(20,20,20,.85);

    border-radius:15px;

    padding:20px;
    margin-bottom:15px;

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 10px rgba(255,255,255,.1);
}

.song h3{
    margin-bottom:10px;
}

.voteBtn{
    margin-top:10px;
}

</style>

</head>

<body>

<img src="logo.jpg" class="logo" alt="DJ LEONARDX">

<h1>DJ LEONARDX</h1>

<div class="card">

<input
id="nombre"
placeholder="Tu nombre">

<input
id="cancion"
placeholder="Nombre de la canción">

<button onclick="enviarCancion()">
Enviar Solicitud
</button>

</div>

<div id="listaCanciones"></div>

<script type="module">

import {
db,
auth,
ref,
push,
set,
get,
onValue,
runTransaction
}
from "./firebase.js";

window.enviarCancion = async function(){

const nombre =
document.getElementById("nombre").value.trim();

const cancion =
document.getElementById("cancion").value.trim();

if(!nombre || !cancion){
alert("Completa todos los campos");
return;
}

const snapshot =
await get(ref(db,"solicitudes"));

let encontrada = null;

if(snapshot.exists()){

snapshot.forEach(item=>{

const data = item.val();

if(
data.cancion.toLowerCase()
===
cancion.toLowerCase()
){
encontrada = item.key;
}

});

}

if(encontrada){

votar(encontrada);

alert(
"Esta canción ya existe. Se sumó tu voto."
);

}else{

const nuevaRef =
push(ref(db,"solicitudes"));

await set(nuevaRef,{
nombre,
cancion,
fecha:Date.now(),
votos:1,
estado:"pendiente"
});

}

document.getElementById("cancion").value="";
}

window.votar = async function(idCancion){

const uid = auth.currentUser.uid;

const votoRef =
ref(
db,
`votosUsuarios/${idCancion}/${uid}`
);

const yaVoto =
await get(votoRef);

if(yaVoto.exists()){
alert("Ya votaste por esta canción");
return;
}

await set(votoRef,true);

const votosRef =
ref(
db,
`solicitudes/${idCancion}/votos`
);

await runTransaction(
votosRef,
(actual)=> (actual || 0)+1
);

}

onValue(
ref(db,"solicitudes"),
(snapshot)=>{

const lista =
document.getElementById(
"listaCanciones"
);

lista.innerHTML="";

if(!snapshot.exists()) return;

const canciones=[];

snapshot.forEach(item=>{

canciones.push({
id:item.key,
...item.val()
});

});

canciones.sort(
(a,b)=>b.votos-a.votos
);

canciones.forEach(song=>{

lista.innerHTML += `
<div class="song">
<h3>${song.cancion}</h3>
<p>👍 ${song.votos} votos</p>

<button
class="voteBtn"
onclick="votar('${song.id}')">
Votar
</button>

</div>
`;

});

});

</script>

</body>
</html>
